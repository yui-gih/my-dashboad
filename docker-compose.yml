version: "3.9"

services:
  # Python FastAPI + LangGraph エージェント
  agent:
    build:
      context: ./apps/agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./apps/agent/.env
    volumes:
      - ./apps/agent/src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Next.js フロントエンド
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env.local
    environment:
      - NEXT_PUBLIC_AGENT_URL=http://agent:8000
    depends_on:
      agent:
        condition: service_healthy

networks:
  default:
    name: my-dashboard
